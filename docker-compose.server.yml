services:
  server:
    build: ./server
    image: ajaymare/traffic-gen-server:latest
    container_name: traffic-server
    ports:
      - "80:80"
      - "443:443"
      - "5201:5201"
      - "5201:5201/udp"
      - "5202:5202"
      - "5202:5202/udp"
      - "5203:5203"
      - "5203:5203/udp"
      - "9999:9999"
      - "9998:9998/udp"
      - "21:21"
      - "21100-21110:21100-21110"
      - "2222:2222"
      - "8082:8082"
    restart: unless-stopped
